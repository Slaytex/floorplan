<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floorplan Editor — 32′ × 20′</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Floorplan — <em>32′ × 20′</em></h1>
  <span class="hscale">¼″ = 1′ &nbsp;·&nbsp; 4″ walls &nbsp;·&nbsp; 4′ sections</span>
  <span class="hscale" id="zoom-display">100%</span>
  <div class="hactions">
    <button class="hbtn" onclick="exportSVG()">↓ SVG</button>
    <button class="hbtn" onclick="exportPDF()">↓ PDF</button>
    <button class="hbtn" onclick="exportDXF()">↓ DXF</button>
    <button class="hbtn" onclick="resetPlan()">↺ Reset</button>
  </div>
</header>

<div class="left-panel">
  <div class="psec">Wall Sections</div>
  <button class="tbtn active" data-tool="wall" data-tip="Paint wall sections solid" onclick="setTool('wall')"><div class="ti ti-wall"></div>Wall</button>
  <button class="tbtn" data-tool="window" data-tip="Paint wall sections as windows" onclick="setTool('window')"><div class="ti ti-window"></div>Window</button>
  <button class="tbtn" data-tool="door" data-tip="Paint wall sections as doors" onclick="setTool('door')"><div class="ti ti-door"></div>Door</button>
  <button class="tbtn" data-tool="door-sidelight" data-tip="Door with sidelight panel · right-click to flip side" onclick="setTool('door-sidelight')"><div class="ti ti-door">⊞</div>Door+Sidelight</button>
  <div class="psec">Drawing</div>
  <button class="tbtn" data-tool="floor-line" data-tip="Draw interior room divider walls" onclick="setTool('floor-line')"><div class="ti ti-floor"></div>Floor Line<kbd class="tbtn-kbd">F</kbd></button>
  <button class="tbtn" data-tool="select" data-tip="Click a wall or furniture to select · drag to move · Delete to remove" onclick="setTool('select')"><div class="ti ti-sel">↖</div>Select/Move<kbd class="tbtn-kbd">S</kbd></button>
  <div class="psec">Edit</div>
  <button class="tbtn" data-tip="Add a 36″ door opening to the selected wall" onclick="addOpening(OPENING_STD)"><div class="ti ti-floor">⊟</div>Opening 36″ door<kbd class="tbtn-kbd">D</kbd></button>
  <button class="tbtn" data-tip="Add a 32″ pocket door opening to the selected wall" onclick="addOpening(OPENING_POCKET)"><div class="ti ti-floor">⊟</div>Opening 32″ pocket<kbd class="tbtn-kbd">P</kbd></button>
  <button class="tbtn" data-tip="Remove all interior walls (cannot be undone)" onclick="clearLines()"><div class="ti ti-era">✕✕</div>Clear Walls</button>
  <div class="psec">Dimensions</div>
  <div class="info-block">
    Interior<br><span id="dim-interior">32′ × 20′</span><br>
    Overall<br><span id="dim-overall">32′8″ × 20′8″</span><br>
    Wall<br><span>4″ thick</span><br>
    Sections<br><span id="dim-sections">4′ × 8+5=40</span>
  </div>
  <div class="psec">Current User Name</div>
  <div class="info-block">
    <input type="text" id="user-name-input" class="name-input" value="User 1" maxlength="24">
    <button class="tbtn" style="margin-top:7px;width:100%" onclick="updateMyName()">Update</button>
  </div>
</div>

<div class="canvas-area" id="canvas-area">
  <div id="zoom-layer">
    <svg id="fp-svg"></svg>
  </div>
</div>

<div class="right-panel">
  <div class="psec" style="border-top:none;margin-top:0;padding-top:0">Furniture</div>
  <div style="font-size:8px;color:var(--muted);margin-bottom:2px">Drag onto plan · RC=90° · ⌥RC=45°</div>
  <div class="fgrid" id="furn-grid"></div>
</div>

<div id="status">Wall tool active</div>
<script src="js/constants.js"></script>
<script src="js/state.js"></script>
<script src="js/render.js"></script>
<script src="js/furniture.js"></script>
<script src="js/events.js"></script>
<script src="js/controls.js"></script>
<script src="js/export.js"></script>
<script src="js/sync.js"></script>
<script src="js/main.js"></script>
<script>
(function(){
  const tip=document.createElement('div');
  tip.id='tip';
  document.body.appendChild(tip);
  let timer;
  document.querySelectorAll('.tbtn[data-tip]').forEach(btn=>{
    btn.addEventListener('mouseenter',()=>{
      clearTimeout(timer);
      timer=setTimeout(()=>{
        const r=btn.getBoundingClientRect();
        tip.textContent=btn.dataset.tip;
        tip.style.left=(r.right+10)+'px';
        tip.style.top=(r.top+r.height/2)+'px';
        tip.classList.add('tip-visible');
      },1000);
    });
    btn.addEventListener('mouseleave',()=>{
      clearTimeout(timer);
      tip.classList.remove('tip-visible');
    });
  });
})();
</script>
</body>
</html>
