<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floorplan</title>
<link rel="stylesheet" href="style.css">
<style>
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .lobby{flex:1;display:flex;align-items:flex-start;justify-content:center;
    padding:48px 24px;overflow-y:auto}
  .lobby-col{width:100%;max-width:460px}
  .room-row{display:flex;align-items:center;gap:12px;padding:9px 10px;
    border-radius:5px;border:1px solid transparent;transition:all .12s;
    cursor:pointer;text-decoration:none;color:var(--muted)}
  .room-row:hover{background:var(--panel2);border-color:var(--border);color:var(--text)}
  .room-name{flex:1;font-size:12px;color:var(--text)}
  .room-meta{font-size:8px;letter-spacing:.08em;color:var(--muted);white-space:nowrap}
  .room-open{font-size:9px;letter-spacing:.1em;color:var(--accent)}
  .room-del{font-size:11px;color:var(--muted);background:none;border:none;
    cursor:pointer;padding:2px 6px;border-radius:3px;opacity:0;transition:opacity .12s;line-height:1;font-family:'DM Mono',monospace;}
  .room-row:hover .room-del{opacity:1}
  .room-del:hover{color:#c47a7a !important;opacity:1 !important}
  .empty-state{font-size:10px;color:var(--muted);padding:8px 4px}
  .create-row{display:flex;gap:8px;margin-top:4px}
  .create-input{flex:1;background:var(--panel);border:none;
    border-bottom:1px solid var(--text);color:var(--text);
    font-family:'DM Mono',monospace;font-size:11px;padding:5px 4px;outline:none}
  .create-input:focus{border-bottom-color:var(--accent)}
  .create-btn{padding:5px 14px;border:1px solid var(--border);border-radius:4px;
    background:var(--panel2);color:var(--muted);font-family:'DM Mono',monospace;
    font-size:10px;letter-spacing:.08em;cursor:pointer;transition:all .15s;white-space:nowrap}
  .create-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<header>
  <h1>Floorplan</h1>
  <span class="hscale">¼″ = 1′ &nbsp;·&nbsp; collaborative floor planning</span>
</header>

<div class="lobby">
  <div class="lobby-col">
    <div class="psec" style="border-top:none;margin-top:0;padding-top:0">Rooms</div>
    <div id="room-list"></div>
    <div class="psec">New Room</div>
    <div class="create-row">
      <input class="create-input" id="room-name" type="text" placeholder="room name" maxlength="48" autocomplete="off">
      <button class="create-btn" onclick="createRoom()">Create →</button>
    </div>
  </div>
</div>

<div id="status">Loading…</div>

<script>
async function loadRooms(){
  try {
    const rooms = await fetch('/api/rooms').then(r => r.json());
    const el = document.getElementById('room-list');
    if(!rooms.length){
      el.innerHTML = '<div class="empty-state">No rooms yet — create one below.</div>';
      setStatus('Ready');
      return;
    }
    el.innerHTML = rooms.map(rm => `
      <a class="room-row" href="editor.html?room=${encodeURIComponent(rm.id)}">
        <span class="room-name">${esc(rm.name)}</span>
        <span class="room-meta">${fmt(rm.lastModified)}</span>
        <span class="room-open">Open →</span>
        <button class="room-del" data-id="${esc(rm.id)}" title="Delete room">✕</button>
      </a>`).join('');
    el.querySelectorAll('.room-del').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.preventDefault(); e.stopPropagation();
        if(!confirm('Delete this room? This cannot be undone.')) return;
        await fetch(`/api/rooms/${btn.dataset.id}`, {method:'DELETE'});
        loadRooms();
      });
    });
    setStatus('Ready');
  } catch(e) {
    setStatus('Could not reach server');
  }
}

async function createRoom(){
  const input = document.getElementById('room-name');
  const name  = input.value.trim();
  if(!name){ input.focus(); return; }
  try {
    const room = await fetch('/api/rooms', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name})
    }).then(r => r.json());
    window.location.href = `editor.html?room=${encodeURIComponent(room.id)}`;
  } catch(e) {
    setStatus('Could not create room');
  }
}

function esc(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(iso){ return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }

let _st;
function setStatus(msg){
  const el = document.getElementById('status');
  el.textContent = msg;
  clearTimeout(_st);
  if(msg !== 'Ready') _st = setTimeout(() => el.textContent = '', 3000);
}

document.getElementById('room-name').addEventListener('keydown', e => { if(e.key==='Enter') createRoom(); });
loadRooms();
</script>
</body>
</html>
